services:
  test-db:
    network_mode: host
    command: ["postgres", "-p", "${E2E_HOST_DB_PORT:-55433}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${E2E_HOST_DB_PORT:-55433} -U ${E2E_DB_USER:-postgres} -d ${E2E_DB_NAME:-e2e_external}"]

  external-mock:
    network_mode: host
    image: wiremock/wiremock:3.6.0
    volumes:
      - "./mock/age-service:/home/wiremock"

  app-under-test:
    network_mode: host
    environment:
      ASPNETCORE_URLS: "http://127.0.0.1:${E2E_HOST_APP_PORT:-58081}"
      ConnectionStrings__DefaultConnection: "Host=127.0.0.1;Port=${E2E_HOST_DB_PORT:-55433};Database=${E2E_DB_NAME:-e2e_external};Username=${E2E_DB_USER:-postgres};Password=${E2E_DB_PASSWORD:-postgres}"
      ExternalServices__AgePrediction__Enabled: "true"
      ExternalServices__AgePrediction__Mode: "${E2E_EXTERNAL_MODE:-mock}"
      ExternalServices__AgePrediction__RealBaseUrl: "${E2E_EXTERNAL_REAL_BASE_URL:-https://api.agify.io}"
      ExternalServices__AgePrediction__MockBaseUrl: "http://127.0.0.1:${E2E_HOST_MOCK_PORT:-8080}"

  e2e-tests:
    network_mode: host
    environment:
      E2E_BASE_URL: "http://127.0.0.1:${E2E_HOST_APP_PORT:-58081}/"
      E2E_DB_HOST: "127.0.0.1"
      E2E_DB_HOST_PORT: "${E2E_HOST_DB_PORT:-55433}"
      E2E_EXTERNAL_TEST_NAME: "${E2E_EXTERNAL_TEST_NAME:-ivan}"
