services:
  test-db:
    network_mode: host
    command: ["postgres", "-p", "${E2E_HOST_DB_PORT:-55433}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${E2E_HOST_DB_PORT:-55433} -U ${E2E_DB_USER:-postgres} -d ${E2E_DB_NAME:-e2e_external}"]

  app-under-test:
    network_mode: host
    environment:
      ASPNETCORE_URLS: "http://127.0.0.1:${E2E_HOST_APP_PORT:-58081}"
      ConnectionStrings__DefaultConnection: "Host=127.0.0.1;Port=${E2E_HOST_DB_PORT:-55433};Database=${E2E_DB_NAME:-e2e_external};Username=${E2E_DB_USER:-postgres};Password=${E2E_DB_PASSWORD:-postgres}"

  e2e-tests:
    network_mode: host
    environment:
      E2E_BASE_URL: "http://127.0.0.1:${E2E_HOST_APP_PORT:-58081}/"
      E2E_DB_HOST: "127.0.0.1"
      E2E_DB_HOST_PORT: "${E2E_HOST_DB_PORT:-55433}"
