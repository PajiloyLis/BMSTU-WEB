services:
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: "${E2E_DB_NAME:-e2e_external}"
      POSTGRES_USER: "${E2E_DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${E2E_DB_PASSWORD:-postgres}"
    volumes:
      - "./DB_data_scripts:/db-data:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${E2E_DB_USER:-postgres} -d ${E2E_DB_NAME:-e2e_external}"]
      interval: 2s
      timeout: 2s
      retries: 30

  app-under-test:
    image: bmstu/app-under-test:local
    build:
      context: .
      dockerfile: Dockerfile.app-under-test
    environment:
      ASPNETCORE_ENVIRONMENT: "Integration"
      ASPNETCORE_URLS: "http://+:8080"
      IntegrationTestAuth__Enabled: "${E2E_TEST_AUTH_ENABLED:-false}"
      AuthorizationSecurity__Enabled: "${E2E_AUTH_SECURITY_ENABLED:-false}"
      AuthorizationSecurity__RequireTwoFactor: "${E2E_AUTH_REQUIRE_2FA:-true}"
      AuthorizationSecurity__ExposeCodesForTests: "${E2E_AUTH_EXPOSE_CODES_FOR_TESTS:-false}"
      AuthorizationSecurity__MaxFailedLoginAttempts: "${E2E_AUTH_MAX_FAILED_ATTEMPTS:-5}"
      AuthorizationSecurity__LockoutMinutes: "${E2E_AUTH_LOCKOUT_MINUTES:-15}"
      AuthorizationSecurity__OtpLifetimeMinutes: "${E2E_AUTH_OTP_LIFETIME_MINUTES:-5}"
      AuthorizationSecurity__RecoveryTokenLifetimeMinutes: "${E2E_AUTH_RECOVERY_TOKEN_LIFETIME_MINUTES:-30}"
      AuthorizationSecurity__PasswordMaxAgeDays: "${E2E_AUTH_PASSWORD_MAX_AGE_DAYS:-90}"
      ConnectionStrings__DefaultConnection: "Host=test-db;Port=5432;Database=${E2E_DB_NAME:-e2e_external};Username=${E2E_DB_USER:-postgres};Password=${E2E_DB_PASSWORD:-postgres}"
    depends_on:
      test-db:
        condition: service_healthy

  e2e-tests:
    image: bmstu/e2e-tests:local
    build:
      context: .
      dockerfile: Dockerfile.e2e-tests
    working_dir: /workspace
    environment:
      E2E_BASE_URL: "http://app-under-test:8080/"
      E2E_DB_HOST: "test-db"
      E2E_DB_HOST_PORT: "5432"
      E2E_DB_NAME: "${E2E_DB_NAME:-e2e_external}"
      E2E_DB_USER: "${E2E_DB_USER:-postgres}"
      E2E_DB_PASSWORD: "${E2E_DB_PASSWORD:-postgres}"
    volumes:
      - "./src/Tests/Project.E2E.Tests/allure-results:/workspace/src/Tests/Project.E2E.Tests/allure-results"
      - "./src/Tests/Project.BDD.E2E.Tests/allure-results:/workspace/src/Tests/Project.BDD.E2E.Tests/allure-results"
      - "./TestResults:/workspace/TestResults"
    depends_on:
      test-db:
        condition: service_healthy
      app-under-test:
        condition: service_started
